<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工时统计 - 桌宠小助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #fef6e4;
            --bg-end: #f3d9b1;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.6);
            --text-primary: #3d3a35;
            --text-secondary: #7a756d;
            --accent-orange: #e07a3a;
            --accent-coral: #e8927c;
            --accent-pink: #d4829a;
            --accent-mint: #7db9a8;
            --accent-lavender: #a89ec9;
            --shadow-soft: 0 8px 32px rgba(180, 140, 100, 0.15);
            --shadow-card: 0 4px 20px rgba(180, 140, 100, 0.12);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* 装饰背景 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -30%;
            width: 80%;
            height: 100%;
            background: radial-gradient(circle, rgba(232, 122, 60, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -20%;
            width: 60%;
            height: 80%;
            background: radial-gradient(circle, rgba(212, 130, 154, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeInDown 0.6s ease-out;
        }

        .header h1 {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 36px;
            font-weight: normal;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .header .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header .subtitle::before,
        .header .subtitle::after {
            content: '';
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
        }

        /* 导航 */
        .date-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            animation: fadeInDown 0.6s ease-out 0.1s both;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--card-bg);
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
            box-shadow: var(--shadow-card);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            color: var(--accent-orange);
        }

        .current-date {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            background: var(--card-bg);
            padding: 10px 24px;
            border-radius: 30px;
            box-shadow: var(--shadow-card);
            min-width: 160px;
            text-align: center;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--card-border);
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease-out both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.15s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.25s; }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(180, 140, 100, 0.2);
        }

        .stat-card .icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .stat-card .sub {
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.8;
            margin-top: 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeInUp 0.5s ease-out 0.3s both;
        }

        .tab {
            padding: 12px 28px;
            border: none;
            background: var(--card-bg);
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-card);
        }

        .tab:hover {
            color: var(--accent-orange);
        }

        .tab.active {
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral));
            color: white;
            transform: scale(1.02);
        }

        /* 内容卡片 */
        .content-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--card-border);
            animation: fadeInUp 0.5s ease-out 0.35s both;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-orange), var(--accent-pink));
            border-radius: 2px;
        }

        /* 项目列表 */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .project-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: linear-gradient(135deg, rgba(254, 246, 228, 0.8), rgba(243, 217, 177, 0.5));
            border-radius: var(--radius-md);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .project-item:hover {
            transform: translateX(8px);
            box-shadow: 0 4px 20px rgba(180, 140, 100, 0.15);
        }

        .project-rank {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .project-rank.gold { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .project-rank.silver { background: linear-gradient(135deg, #9ca3af, #6b7280); }
        .project-rank.bronze { background: linear-gradient(135deg, #d97706, #b45309); }
        .project-rank.default { background: linear-gradient(135deg, var(--accent-orange), var(--accent-coral)); }

        .project-info {
            flex: 1;
            min-width: 0;
        }

        .project-name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-orange), var(--accent-coral), var(--accent-pink));
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .project-stats {
            text-align: right;
            flex-shrink: 0;
        }

        .project-time {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .project-percent {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* 时间线 */
        .timeline-section {
            margin-top: 32px;
        }

        .timeline {
            display: flex;
            height: 56px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-md);
            overflow: hidden;
            padding: 6px;
            gap: 3px;
        }

        .timeline-segment {
            height: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: white;
            font-weight: 500;
            transition: flex 0.5s ease;
            min-width: 24px;
            cursor: pointer;
            position: relative;
        }

        .timeline-segment:hover {
            transform: scaleY(1.05);
            z-index: 1;
        }

        .timeline-segment span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            padding: 0 4px;
        }

        .timeline-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* 周趋势图 */
        .week-trend {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }

        .day-card {
            text-align: center;
            padding: 20px 8px;
            background: linear-gradient(135deg, rgba(254, 246, 228, 0.8), rgba(243, 217, 177, 0.5));
            border-radius: var(--radius-md);
            transition: all 0.3s ease;
        }

        .day-card:hover {
            transform: translateY(-4px);
        }

        .day-card .day-name {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .day-card .bar-wrap {
            height: 80px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 12px;
        }

        .day-card .bar {
            width: 28px;
            background: linear-gradient(180deg, var(--accent-orange), var(--accent-coral));
            border-radius: 6px 6px 0 0;
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 4px;
        }

        .day-card .hours {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .day-card .date {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 表格 */
        .records-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .records-table th {
            text-align: left;
            padding: 14px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 2px solid rgba(232, 122, 60, 0.2);
            background: rgba(254, 246, 228, 0.5);
        }

        .records-table th:first-child {
            border-radius: 10px 0 0 0;
        }

        .records-table th:last-child {
            border-radius: 0 10px 0 0;
        }

        .records-table td {
            padding: 16px;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(180, 140, 100, 0.1);
        }

        .records-table tr:last-child td {
            border-bottom: none;
        }

        .records-table tr:last-child td:first-child {
            border-radius: 0 0 0 10px;
        }

        .records-table tr:last-child td:last-child {
            border-radius: 0 0 10px 0;
        }

        .records-table tbody tr {
            transition: background 0.2s ease;
        }

        .records-table tbody tr:hover {
            background: rgba(254, 246, 228, 0.5);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .empty-state p {
            font-size: 15px;
        }

        /* 底部装饰 */
        .footer-deco {
            text-align: center;
            margin-top: 32px;
            font-size: 24px;
            opacity: 0.6;
            animation: fadeInUp 0.5s ease-out 0.4s both;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .week-trend {
                grid-template-columns: repeat(4, 1fr);
            }

            .week-trend .day-card:nth-child(n+5) {
                display: none;
            }

            .project-item {
                flex-wrap: wrap;
            }

            .project-stats {
                width: 100%;
                text-align: left;
                display: flex;
                gap: 12px;
                margin-top: 8px;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(254, 246, 228, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-orange), var(--accent-coral));
            border-radius: 4px;
        }

        ::selection {
            background: var(--accent-orange);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>工时小账本</h1>
            <div class="subtitle">记录每一天的足迹</div>
        </div>

        <div class="date-nav">
            <button class="nav-btn" onclick="changeDate(-1)">◀</button>
            <div class="current-date" id="currentDate">-</div>
            <button class="nav-btn" onclick="changeDate(1)">▶</button>
        </div>

        <div class="stats-grid" id="statsRow"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('today')">今日</button>
            <button class="tab" onclick="switchTab('week')">本周</button>
            <button class="tab" onclick="switchTab('month')">本月</button>
        </div>

        <div class="content-card">
            <div id="todayContent" class="tab-content active"></div>
            <div id="weekContent" class="tab-content"></div>
            <div id="monthContent" class="tab-content"></div>
        </div>

        <div class="footer-deco">✿ 好好工作，天天向上 ✿</div>
    </div>

    <script>
        const workData = {{WORK_DATA}};

        let currentDate = new Date();
        let currentTab = 'today';

        const COLORS = [
            '#e07a3a', '#e8927c', '#d4829a', '#c9a8d4',
            '#a89ec9', '#7db9a8', '#5fa8b9', '#e07a5f'
        ];

        function formatDuration(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h === 0) return `${m}分钟`;
            if (m === 0) return `${h}小时`;
            return `${h}h ${m}m`;
        }

        // 使用本地时间获取日期字符串
        function getLocalDateStr(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function formatShortTime(timestamp) {
            const d = new Date(timestamp * 1000);
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        function getDayName(dateStr) {
            const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            return dayNames[new Date(dateStr).getDay()];
        }

        function changeDate(delta) {
            if (currentTab === 'today') {
                currentDate.setDate(currentDate.getDate() + delta);
            } else if (currentTab === 'week') {
                currentDate.setDate(currentDate.getDate() + delta * 7);
            } else {
                currentDate.setMonth(currentDate.getMonth() + delta);
            }
            updateDisplay();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach((t) => {
                t.classList.toggle('active', t.textContent.trim() ===
                    (tab === 'today' ? '今日' : tab === 'week' ? '本周' : '本月'));
            });
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab + 'Content').classList.add('active');
            updateDisplay();
        }

        function updateDisplay() {
            const y = currentDate.getFullYear();
            const m = String(currentDate.getMonth() + 1).padStart(2, '0');
            const d = String(currentDate.getDate()).padStart(2, '0');
            const dateStr = `${y}-${m}-${d}`;  // 使用本地时间而非 UTC
            document.getElementById('currentDate').textContent = dateStr;
            renderStats(dateStr);

            if (currentTab === 'today') renderToday(dateStr);
            else if (currentTab === 'week') renderWeek(dateStr);
            else renderMonth(dateStr);
        }

        function toggleChildren(btn) {
            const childrenList = btn.closest('.project-info').querySelector('.children-list');
            if (childrenList) {
                const isHidden = childrenList.style.display === 'none';
                childrenList.style.display = isHidden ? 'block' : 'none';
                btn.textContent = isHidden ? '▼' : '▶';
            }
        }

        function getRecordsByDate(dateStr) {
            return workData[dateStr] || [];
        }

        function aggregateByProject(records) {
            const grouped = {};
            records.forEach(r => {
                // 优先按 group_key 分组，其次按 title 分组
                const key = r.group_key || r.title;
                if (!grouped[key]) {
                    grouped[key] = {
                        title: r.title,
                        group_key: key,
                        duration: 0,
                        start: r.start,
                        end: r.end,
                        count: 0,
                        children: []  // 子项（具体页面）
                    };
                }
                // 提取网站名前缀用于显示（如 "[博客园] "）
                const sitePrefix = key.startsWith('site:') ? '[' + key.slice(5) + '] ' : '';
                const childTitle = sitePrefix + r.title.replace(/^\[.+\]\s*/, '');  // 去掉原有的前缀

                grouped[key].duration += r.duration;
                grouped[key].start = Math.min(grouped[key].start, r.start);
                grouped[key].end = Math.max(grouped[key].end, r.end);
                grouped[key].count = (grouped[key].count || 0) + 1;

                // 记录子项
                const existingChild = grouped[key].children.find(c => c.title === childTitle);
                if (existingChild) {
                    existingChild.duration += r.duration;
                    existingChild.count += 1;
                } else {
                    grouped[key].children.push({ title: childTitle, duration: r.duration, count: 1 });
                }
            });

            // 对子项也按时间排序
            Object.values(grouped).forEach(g => {
                g.children.sort((a, b) => b.duration - a.duration);
            });

            return Object.values(grouped).sort((a, b) => b.duration - a.duration);
        }

        function renderStats(dateStr) {
            let total = 0, count = 0;

            if (currentTab === 'today') {
                const records = getRecordsByDate(dateStr);
                total = records.reduce((s, r) => s + r.duration, 0);
                count = records.length;
            } else if (currentTab === 'week') {
                const monday = new Date(currentDate);
                monday.setDate(currentDate.getDate() - currentDate.getDay() + 1);
                for (let i = 0; i < 7; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    const ds = getLocalDateStr(d);
                    total += getRecordsByDate(ds).reduce((s, r) => s + r.duration, 0);
                    count += getRecordsByDate(ds).length;
                }
            } else {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                for (let d = 1; d <= 31; d++) {
                    const date = new Date(year, month, d);
                    if (date.getMonth() !== month) break;
                    const ds = getLocalDateStr(date);
                    total += getRecordsByDate(ds).reduce((s, r) => s + r.duration, 0);
                    count += getRecordsByDate(ds).length;
                }
            }

            const icons = ['⏱️', '📊', '📈'];
            const labels = ['总工时', '记录数', '日均'];
            const subs = ['累计学习时间', '次窗口切换', currentTab === 'today' ? '今日平均' : '本周平均'];

            let values = [
                formatDuration(total),
                count,
                formatDuration(currentTab === 'today' ? total : Math.round(total / 7))
            ];

            document.getElementById('statsRow').innerHTML = values.map((v, i) => `
                <div class="stat-card">
                    <div class="icon">${icons[i]}</div>
                    <div class="value">${v}</div>
                    <div class="label">${labels[i]}</div>
                    <div class="sub">${subs[i]}</div>
                </div>
            `).join('');
        }

        function renderToday(dateStr) {
            const records = getRecordsByDate(dateStr);
            const projects = aggregateByProject(records);
            const total = records.reduce((s, r) => s + r.duration, 0);

            if (records.length === 0) {
                document.getElementById('todayContent').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <p>还没有记录哦，开始工作吧！</p>
                    </div>
                `;
                return;
            }

            const maxDuration = projects[0]?.duration || 1;

            // 时间线
            const startHour = 6, endHour = 24;
            const totalHours = endHour - startHour;
            const segments = records.map(r => {
                const startDate = new Date(r.start * 1000);
                const endDate = new Date(r.end * 1000);
                let start = startDate.getHours() + startDate.getMinutes() / 60;
                let end = endDate.getHours() + endDate.getMinutes() / 60;
                start = Math.max(startHour, Math.min(start, endHour));
                end = Math.max(start, Math.min(end, endHour));
                return { title: r.title, start: start - startHour, duration: end - start };
            });

            const visibleProjects = projects.slice(0, 20);
            const visibleTotal = visibleProjects.reduce((s, p) => s + p.duration, 0);

            document.getElementById('todayContent').innerHTML = `
                <div class="section-header">
                    <div class="section-title">项目分布</div>
                    <div style="font-size: 12px; color: var(--text-secondary);">显示前 ${visibleProjects.length} 个项目 (共 ${projects.length} 个)</div>
                </div>
                <div class="project-list">
                    ${visibleProjects.map((p, i) => {
                        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'default';
                        const hasChildren = p.children && p.children.length > 1;
                        const childrenHtml = hasChildren ? `
                            <div class="children-list" style="display:none; margin-top: 12px; padding-left: 20px;">
                                ${p.children.map(c => `
                                    <div class="child-item" style="display:flex; justify-content:space-between; padding: 6px 0; border-bottom: 1px dashed rgba(180,140,100,0.15);">
                                        <span class="child-title" style="color: var(--text-secondary); font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${c.title}</span>
                                        <span style="color: var(--text-secondary); font-size: 12px; margin-left: 12px;">${formatDuration(c.duration)} <span style="opacity:0.6">(${c.count}次)</span></span>
                                    </div>
                                `).join('')}
                            </div>
                        ` : '';
                        const toggleIcon = hasChildren ? `<span class="toggle-btn" onclick="toggleChildren(this)" style="cursor:pointer; margin-right:8px; font-size:12px;">▶</span>` : '<span style="width:20px;display:inline-block;"></span>';
                        return `
                            <div class="project-item">
                                <div class="project-rank ${rankClass}">${i + 1}</div>
                                <div class="project-info" style="flex:1; min-width:0;">
                                    <div style="display:flex; align-items:center;">
                                        ${toggleIcon}
                                        <div class="project-name" title="${p.title}" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p.title}${p.count > 1 ? ` (${p.count}次)` : ''}</div>
                                    </div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${(p.duration / maxDuration * 100).toFixed(1)}%"></div>
                                    </div>
                                    ${childrenHtml}
                                </div>
                                <div class="project-stats">
                                    <div class="project-time">${formatDuration(p.duration)}</div>
                                    <div class="project-percent">${total > 0 ? (p.duration / total * 100).toFixed(1) : 0}%</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>

                <div class="timeline-section">
                    <div class="section-header">
                        <div class="section-title">时间线</div>
                    </div>
                    <div class="timeline">
                        ${segments.map(s => {
                            const width = (s.duration / totalHours * 100).toFixed(2);
                            const color = COLORS[Math.abs(s.title.charCodeAt(0)) % COLORS.length];
                            return `<div class="timeline-segment" style="flex:${width}%;background:${color}" title="${s.title} - ${formatDuration(s.duration * 3600)}"><span>${s.title.split(' - ')[0].substring(0, 6)}</span></div>`;
                        }).join('')}
                    </div>
                    <div class="timeline-labels">
                        <span>06:00</span>
                        <span>12:00</span>
                        <span>18:00</span>
                        <span>24:00</span>
                    </div>
                </div>
            `;
        }

        function renderWeek(dateStr) {
            const monday = new Date(currentDate);
            monday.setDate(currentDate.getDate() - currentDate.getDay() + 1);

            const days = [];
            let maxDayDuration = 0;
            const allProjects = {};

            for (let i = 0; i < 7; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                const ds = getLocalDateStr(d);
                const records = getRecordsByDate(ds);
                const dayTotal = records.reduce((s, r) => s + r.duration, 0);
                days.push({ date: ds, total: dayTotal, records });
                maxDayDuration = Math.max(maxDayDuration, dayTotal);

                records.forEach(r => {
                    if (!allProjects[r.title]) allProjects[r.title] = { title: r.title, duration: 0 };
                    allProjects[r.title].duration += r.duration;
                });
            }

            const projects = Object.values(allProjects).sort((a, b) => b.duration - a.duration);
            const maxDuration = projects[0]?.duration || 1;
            const totalWeek = days.reduce((s, d) => s + d.total, 0);

            const dayNames = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

            document.getElementById('weekContent').innerHTML = `
                <div class="week-trend">
                    ${days.map((d, i) => {
                        const height = d.total > 0 ? Math.max(4, (d.total / maxDayDuration) * 80) : 4;
                        return `
                            <div class="day-card">
                                <div class="day-name">${dayNames[i]}</div>
                                <div class="bar-wrap">
                                    <div class="bar" style="height:${height}px"></div>
                                </div>
                                <div class="hours">${d.total > 0 ? (d.total / 3600).toFixed(1) : '0'}h</div>
                                <div class="date">${d.date.split('-')[2]}</div>
                            </div>
                        `;
                    }).join('')}
                </div>

                const visibleWeekProjects = projects.slice(0, 20);

                <div class="section-header" style="margin-top:32px">
                    <div class="section-title">项目分布</div>
                    <div style="font-size: 12px; color: var(--text-secondary);">显示前 ${visibleWeekProjects.length} 个项目 (共 ${projects.length} 个)</div>
                </div>
                <div class="project-list">
                    ${visibleWeekProjects.map((p, i) => {
                        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'default';
                        return `
                            <div class="project-item">
                                <div class="project-rank ${rankClass}">${i + 1}</div>
                                <div class="project-info">
                                    <div class="project-name" title="${p.title}">${p.title}${p.count > 1 ? ` (${p.count}次)` : ''}</div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width:${(p.duration / maxDuration * 100).toFixed(1)}%"></div>
                                    </div>
                                </div>
                                <div class="project-stats">
                                    <div class="project-time">${formatDuration(p.duration)}</div>
                                    <div class="project-percent">${totalWeek > 0 ? (p.duration / totalWeek * 100).toFixed(1) : 0}%</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderMonth(dateStr) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const days = [];
            let maxDayDuration = 0;
            const allProjects = {};

            for (let d = 1; d <= 31; d++) {
                const date = new Date(year, month, d);
                if (date.getMonth() !== month) break;
                const ds = getLocalDateStr(date);
                const records = getRecordsByDate(ds);
                const dayTotal = records.reduce((s, r) => s + r.duration, 0);
                days.push({ date: ds, total: dayTotal, count: records.length });
                maxDayDuration = Math.max(maxDayDuration, dayTotal);

                records.forEach(r => {
                    if (!allProjects[r.title]) allProjects[r.title] = { title: r.title, duration: 0 };
                    allProjects[r.title].duration += r.duration;
                });
            }

            const projects = Object.values(allProjects).sort((a, b) => b.duration - a.duration);
            const maxDuration = projects[0]?.duration || 1;
            const totalMonth = days.reduce((s, d) => s + d.total, 0);

            document.getElementById('monthContent').innerHTML = `
                <div class="week-trend">
                    ${days.slice(0, 14).map((d, i) => {
                        const height = d.total > 0 ? Math.max(4, (d.total / maxDayDuration) * 80) : 4;
                        const dayIndex = new Date(d.date).getDay();
                        const dayName = ['日', '一', '二', '三', '四', '五', '六'][dayIndex];
                        return `
                            <div class="day-card">
                                <div class="day-name">周${dayName}</div>
                                <div class="bar-wrap">
                                    <div class="bar" style="height:${height}px"></div>
                                </div>
                                <div class="hours">${d.total > 0 ? (d.total / 3600).toFixed(1) : '0'}h</div>
                                <div class="date">${d.date.split('-')[2]}</div>
                            </div>
                        `;
                    }).join('')}
                </div>

                const visibleMonthProjects = projects.slice(0, 20);

                <div class="section-header" style="margin-top:32px">
                    <div class="section-title">项目排行 Top ${visibleMonthProjects.length}</div>
                    <div style="font-size: 12px; color: var(--text-secondary);">显示前 ${visibleMonthProjects.length} 个项目 (共 ${projects.length} 个)</div>
                </div>
                <div class="project-list">
                    ${visibleMonthProjects.map((p, i) => {
                        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'default';
                        return `
                            <div class="project-item">
                                <div class="project-rank ${rankClass}">${i + 1}</div>
                                <div class="project-info">
                                    <div class="project-name" title="${p.title}">${p.title}${p.count > 1 ? ` (${p.count}次)` : ''}</div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width:${(p.duration / maxDuration * 100).toFixed(1)}%"></div>
                                    </div>
                                </div>
                                <div class="project-stats">
                                    <div class="project-time">${formatDuration(p.duration)}</div>
                                    <div class="project-percent">${totalMonth > 0 ? (p.duration / totalMonth * 100).toFixed(1) : 0}%</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>

                <div class="section-header" style="margin-top:32px">
                    <div class="section-title">每日详情</div>
                </div>
                <table class="records-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>星期</th>
                            <th>工时</th>
                            <th>记录数</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${days.map(d => `
                            <tr>
                                <td>${d.date}</td>
                                <td>${getDayName(d.date)}</td>
                                <td>${formatDuration(d.total)}</td>
                                <td>${d.count}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        updateDisplay();
    </script>
</body>
</html>
